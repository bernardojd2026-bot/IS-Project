<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WON — Watauga Outage Network</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { width: 100%; height: 100%; }

    .info-panel {
      position: absolute;
      top: 20px; left: 20px;
      z-index: 500;
      background: rgba(7,12,20,0.93);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      width: 230px;
      pointer-events: auto;
    }

    .info-panel-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .info-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    .gradient-legend {
      height: 7px;
      border-radius: 4px;
      background: linear-gradient(to right,#22c55e,#84cc16,#eab308,#f97316,#dc2626,#7f1d1d);
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
    }

    .legend-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .fab {
      position: absolute;
      bottom: 36px; right: 24px;
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 20px;
      background: var(--accent);
      color: #041a0e;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0,204,122,.28);
      transition: all 0.15s;
    }
    .fab:hover { background: #00e888; transform: translateY(-2px); box-shadow: 0 6px 28px rgba(0,204,122,.38); }

    .top-isp-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-bright);
      font-weight: 500;
    }

    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 0;
      transition: color 0.15s;
    }
    .refresh-btn:hover { color: var(--accent); }

    /* Leaflet attribution dark */
    .leaflet-control-attribution {
      background: rgba(7,12,20,0.8) !important;
      color: var(--text-muted) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--text-muted) !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; color: var(--accent) !important; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-dot"></div>
    <span>WON</span>
    <span class="tagline" style="color:var(--text-muted);font-weight:300;letter-spacing:0.04em">Watauga Outage Network</span>
  </a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link active">Heatmap</a>
    <a href="report.html"      class="nav-link">Report</a>
    <a href="isps.html"        class="nav-link">ISP Rankings</a>
    <a href="isp-details.html" class="nav-link">ISP Details</a>
  </div>
</nav>

<div class="page-full">
  <div id="map"></div>

  <!-- Info overlay -->
  <div class="info-panel">
    <div class="info-panel-title">Live Outage Heatmap</div>

    <div style="margin-bottom:14px">
      <div class="stat-value" id="report-count" style="font-size:30px">—</div>
      <div class="stat-label">Reports</div>
    </div>

    <select id="time-filter" style="margin-bottom:0;font-size:12px">
      <option value="24">Last 24 Hours</option>
      <option value="168">Last 7 Days</option>
      <option value="720">Last 30 Days</option>
      <option value="0">All Time</option>
    </select>

    <hr class="info-divider">

    <div style="margin-bottom:14px">
      <div class="info-panel-title" style="margin-bottom:8px">Top Reported ISP</div>
      <div class="top-isp-chip">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;flex-shrink:0"></span>
        <span id="top-isp-name">Loading…</span>
      </div>
    </div>

    <hr class="info-divider" style="margin-top:0">

    <div>
      <div class="gradient-legend"></div>
      <div class="legend-labels">
        <span class="legend-label">No reports</span>
        <span class="legend-label">High volume</span>
      </div>
    </div>

    <hr class="info-divider">

    <div style="display:flex;align-items:center;justify-content:space-between">
      <span id="last-updated" style="font-size:10px;color:var(--text-muted)">Connecting…</span>
      <button class="refresh-btn" onclick="loadReports()" title="Refresh">↻ Refresh</button>
    </div>
  </div>

  <!-- FAB -->
  <a href="report.html" class="fab">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Report Outage
  </a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  const db = getSupabaseClient();

  // ── Map init ─────────────────────────────────────────────
  const boundsLL = L.latLngBounds(
    [WATAUGA_BOUNDS.south, WATAUGA_BOUNDS.west],
    [WATAUGA_BOUNDS.north, WATAUGA_BOUNDS.east]
  );

  const map = L.map('map', {
    center: WATAUGA_CENTER,
    zoom: WATAUGA_ZOOM,
    minZoom: 9,
    maxZoom: 16,
    maxBounds: boundsLL.pad(0.3),
    zoomControl: true,
  });

  // Dark tile layer (CartoDB Dark Matter)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // County boundary outline
  L.rectangle(boundsLL, {
    color: 'rgba(0,204,122,0.3)',
    weight: 1.5,
    fill: false,
    dashArray: '5 5',
  }).addTo(map);

  // County label
  L.marker(WATAUGA_CENTER, {
    icon: L.divIcon({
      html: `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,204,122,0.45);white-space:nowrap;pointer-events:none;text-shadow:0 1px 4px #000">Watauga County, NC</div>`,
      iconSize: [160,18], iconAnchor:[80,9], className:''
    })
  }).addTo(map);

  let heatLayer = null;

  // ── Load & render ─────────────────────────────────────────
  async function loadReports() {
    document.getElementById('last-updated').textContent = 'Updating…';
    const hours = parseInt(document.getElementById('time-filter').value);

    let q = db.from('outage_reports').select('lat,lng,isp,created_at');
    if (hours > 0) q = q.gte('created_at', sinceISO(hours));

    const { data, error } = await q;
    if (error) {
      document.getElementById('last-updated').textContent = 'Error loading data';
      console.error(error);
      return;
    }

    const count = data.length;
    document.getElementById('report-count').textContent = count.toLocaleString();
    document.getElementById('last-updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;

    // Top ISP
    const ispMap = {};
    data.forEach(r => { ispMap[r.isp] = (ispMap[r.isp] || 0) + 1; });
    const topEntry = Object.entries(ispMap).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('top-isp-name').textContent = topEntry
      ? `${topEntry[0]} (${topEntry[1]})`
      : 'No reports yet';

    // Heat layer
    if (heatLayer) map.removeLayer(heatLayer);
    if (count > 0) {
      const pts = data.map(r => [+r.lat, +r.lng, 1]);
      heatLayer = L.heatLayer(pts, {
        radius: 32,
        blur: 26,
        maxZoom: 15,
        gradient: HEAT_GRADIENT,
      }).addTo(map);
    }
  }

  document.getElementById('time-filter').addEventListener('change', loadReports);
  loadReports();
  setInterval(loadReports, 120_000); // refresh every 2 min
</script>
</body>
</html>
