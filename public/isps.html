<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NV — ISP Rankings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .isps-wrap { max-width: 960px; margin: 0 auto; padding: 36px 24px 60px; }

    .rank-row {
      padding: 14px 0;
      border-bottom: 1px solid rgba(28,45,69,.5);
    }
    .rank-row:last-child { border-bottom: none; }

    .rank-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 7px;
    }

    .rank-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .rank-1 .rank-num { color: #f6c90e; }
    .rank-2 .rank-num { color: #c0c0c0; }
    .rank-3 .rank-num { color: #cd7f32; }
    .rank-4 .rank-num, .rank-5 .rank-num { color: var(--text-muted); }

    .rank-isp { flex: 1; color: var(--text-bright); font-size: 13px; font-weight: 500; }

    .rank-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      min-width: 36px;
      text-align: right;
    }

    .rank-bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-left: 38px;
    }

    .rank-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.9s cubic-bezier(.25,.46,.45,.94);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .filter-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .isp-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .isp-link:hover { opacity: 1; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-dot"></div>
    <span>WON</span>
    <span class="tagline" style="color:var(--text-muted);font-weight:300;letter-spacing:0.04em">Watauga Outage Network</span>
  </a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link">Heatmap</a>
    <a href="report.html"      class="nav-link">Report</a>
    <a href="isps.html"        class="nav-link active">ISP Rankings</a>
    <a href="isp-details.html" class="nav-link">ISP Details</a>
  </div>
</nav>

<div class="page isps-wrap">

  <!-- Page header -->
  <div style="margin-bottom:28px">
    <h1 style="font-size:18px;font-weight:600;color:var(--text-bright);margin-bottom:6px;letter-spacing:-0.01em">ISP Outage Rankings</h1>
    <p style="color:var(--text-muted);font-size:13px">Top 5 most-reported internet service providers in Watauga County.</p>
  </div>

  <!-- Summary stats -->
  <div class="grid-3" style="margin-bottom:24px">
    <div class="card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total Reports</div>
    </div>
    <div class="card">
      <div class="stat-value" id="stat-isps">—</div>
      <div class="stat-label">ISPs Reported</div>
    </div>
    <div class="card">
      <div class="stat-value" id="stat-today">—</div>
      <div class="stat-label">Reports Today</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <span class="filter-label">Time Range</span>
    <select id="time-filter" style="width:180px">
      <option value="24">Last 24 Hours</option>
      <option value="168">Last 7 Days</option>
      <option value="720" selected>Last 30 Days</option>
      <option value="0">All Time</option>
    </select>
  </div>

  <!-- Main content grid -->
  <div class="grid-2" style="align-items:start">

    <!-- Bar chart card -->
    <div class="card">
      <div class="card-header">Report Volume by ISP</div>
      <div class="chart-wrap" style="height:300px">
        <canvas id="isp-chart"></canvas>
      </div>
    </div>

    <!-- Rankings list card -->
    <div class="card">
      <div class="card-header">Top 5 Rankings</div>
      <div id="rankings-body">
        <div class="loading"><div class="spinner"></div> Loading rankings…</div>
      </div>
    </div>

  </div>

  <!-- Full table below -->
  <div class="card" style="margin-top:16px" id="full-table-card">
    <div class="card-header">All Reported ISPs</div>
    <div id="full-table-body">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script>
  const db = getSupabaseClient();

  const BAR_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6'];
  let chart = null;

  async function load() {
    const hours = parseInt(document.getElementById('time-filter').value);
    let q = db.from('outage_reports').select('isp,created_at');
    if (hours > 0) q = q.gte('created_at', sinceISO(hours));

    const { data, error } = await q;
    if (error || !data) {
      document.getElementById('rankings-body').innerHTML =
        '<div style="color:var(--red);font-size:13px;padding:8px 0">Error loading data.</div>';
      return;
    }

    // Count by ISP
    const counts = {};
    data.forEach(r => { counts[r.isp] = (counts[r.isp] || 0) + 1; });
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const top5   = sorted.slice(0, 5);
    const total  = data.length;

    // Today's count
    const midnight = new Date(); midnight.setHours(0,0,0,0);
    const todayCount = data.filter(r => new Date(r.created_at) >= midnight).length;

    // Stats
    document.getElementById('stat-total').textContent = total.toLocaleString();
    document.getElementById('stat-isps').textContent  = sorted.length;
    document.getElementById('stat-today').textContent = todayCount.toLocaleString();

    if (top5.length === 0) {
      document.getElementById('rankings-body').innerHTML =
        '<div style="color:var(--text-muted);font-size:13px;padding:16px 0;text-align:center">No reports in this period.</div>';
      if (chart) chart.destroy();
      return;
    }

    // ── Rankings list ──────────────────────────────────────
    const maxC = top5[0][1];
    document.getElementById('rankings-body').innerHTML = top5.map(([isp, cnt], i) => {
      const pct = ((cnt / total) * 100).toFixed(1);
      const fill = (cnt / maxC * 100).toFixed(1);
      return `
        <div class="rank-row rank-${i+1}">
          <div class="rank-meta">
            <span class="rank-num">#${i+1}</span>
            <span class="rank-isp">${isp}</span>
            <span class="rank-count">${cnt}</span>
            <span class="badge badge-${i===0?'red':'yellow'}">${pct}%</span>
            <a href="isp-details.html?isp=${encodeURIComponent(isp)}" class="isp-link">Details →</a>
          </div>
          <div class="rank-bar-track">
            <div class="rank-bar-fill" style="width:${fill}%;background:${BAR_COLORS[i]}"></div>
          </div>
        </div>`;
    }).join('');

    // ── Bar chart ──────────────────────────────────────────
    const labels = top5.map(([isp]) => isp.length > 20 ? isp.slice(0,18) + '…' : isp);
    const values = top5.map(([,c]) => c);

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('isp-chart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: BAR_COLORS.map(c => c + 'bb'),
          borderColor:     BAR_COLORS,
          borderWidth: 1.5,
          borderRadius: 4,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0c1420',
            borderColor: '#1c2d45',
            borderWidth: 1,
            titleColor: '#e8f2ff',
            bodyColor: '#4a6080',
            callbacks: { label: ctx => `  ${ctx.parsed.x} reports` },
          },
        },
        scales: {
          x: {
            grid:  { color: 'rgba(28,45,69,.55)' },
            ticks: { color: '#4a6080', font: { family: 'IBM Plex Mono', size: 11 } },
            border:{ color: 'transparent' },
          },
          y: {
            grid:  { display: false },
            ticks: { color: '#c8d6e8', font: { family: 'IBM Plex Mono', size: 11 } },
            border:{ color: 'transparent' },
          },
        },
      },
    });

    // ── Full table ─────────────────────────────────────────
    document.getElementById('full-table-body').innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>#</th>
          <th>ISP</th>
          <th style="text-align:right">Reports</th>
          <th style="text-align:right">Share</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${sorted.map(([isp, cnt], i) => `
            <tr>
              <td style="color:var(--text-muted);width:36px">${i+1}</td>
              <td style="color:var(--text-bright);font-weight:500">${isp}</td>
              <td style="text-align:right;font-weight:600;color:var(--text-bright)">${cnt}</td>
              <td style="text-align:right;color:var(--text-muted)">${((cnt/total)*100).toFixed(1)}%</td>
              <td style="text-align:right">
                <a href="isp-details.html?isp=${encodeURIComponent(isp)}"
                   style="font-size:11px;color:var(--accent);text-decoration:none;opacity:.7"
                   onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.7">
                  Details →
                </a>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  document.getElementById('time-filter').addEventListener('change', load);
  load();
</script>
</body>
</html>
